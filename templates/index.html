<!DOCTYPE html>
<html>
<head>
    <title>LinkedIn Skill Gap Analyzer</title>
</head>
<body style="font-family: Arial; text-align: center; margin-top: 80px;">

    <h1>LinkedIn Skill Gap Analyzer</h1>

    <form action="/analyze" method="POST">

        <div style="margin: 20px;">
            <label><b>Target Job Role:</b></label><br><br>
            <input type="text" name="job_role" placeholder="e.g. Data Scientist" required style="padding:8px; width:300px;">
        </div>

        <div style="margin: 20px;">
            <label><b>Your Skills (comma separated):</b></label><br><br>
            <input type="text" name="skills" placeholder="e.g. Python, SQL, Machine Learning" required style="padding:8px; width:300px;">
        </div>

        <button type="submit" style="padding:10px 20px; font-size:16px;">
            Analyze
        </button>

    </form>

</body>
</html>
